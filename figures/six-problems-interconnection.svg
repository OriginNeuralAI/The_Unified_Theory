<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="1000" height="700">
  <defs>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#D4AF37" opacity="0.6"/>
    </marker>
  </defs>

  <rect width="1000" height="700" fill="#0A2540"/>

  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="24" fill="#FFFFFF" font-weight="bold" filter="url(#glow)">Six Millennium Problems, One Constant</text>
  <text x="500" y="58" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#D4AF37">Connected through the universality constant &#x03A9; = 24</text>

  <!-- Central node: Omega = 24 -->
  <circle cx="500" cy="330" r="65" fill="#112840" stroke="#D4AF37" stroke-width="3" filter="url(#glow)"/>
  <text x="500" y="320" text-anchor="middle" font-family="Georgia, serif" font-size="32" fill="#D4AF37" font-weight="bold" filter="url(#glow)">&#x03A9; = 24</text>
  <text x="500" y="348" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#FFFFFF" opacity="0.7">277+ checks</text>
  <text x="500" y="363" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#FFFFFF" opacity="0.7">0 falsifications</text>

  <!-- RH node (top) -->
  <rect x="380" y="85" width="240" height="75" rx="10" fill="#1A3550" stroke="#4A9BD9" stroke-width="2"/>
  <text x="500" y="110" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#4A9BD9" font-weight="bold">Riemann Hypothesis</text>
  <text x="500" y="130" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#FFFFFF">H_D on C&#xB2;&#xB3; &#x2297; L&#xB2; &#x2022; 140/140 &#x2022; 5M zeros</text>
  <text x="500" y="148" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#00CC66">Secular: 169/169 matched (0.23%)</text>
  <line x1="500" y1="160" x2="500" y2="265" stroke="#4A9BD9" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Yang-Mills node (top-left) -->
  <rect x="50" y="175" width="220" height="70" rx="10" fill="#1A3550" stroke="#8C1E1E" stroke-width="2"/>
  <text x="160" y="200" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#CD5C5C" font-weight="bold">Yang-Mills Mass Gap</text>
  <text x="160" y="218" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#FFFFFF">Tr(K_SU(3)) = 24 &#x2022; 59/59</text>
  <text x="160" y="234" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#FFFFFF" opacity="0.7">B(L) ~ L&#xB3;&#xB7;&#xB9;&#x2078; &#x2022; &#x394; > 0</text>
  <line x1="270" y1="230" x2="437" y2="310" stroke="#8C1E1E" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- P vs NP node (top-right) -->
  <rect x="730" y="175" width="220" height="70" rx="10" fill="#1A3550" stroke="#FF4500" stroke-width="2"/>
  <text x="840" y="200" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#FF6347" font-weight="bold">P &#x2260; NP</text>
  <text x="840" y="218" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#FFFFFF">ord(f)&#xD7;|basins| = 24 &#x2022; 35/35</text>
  <text x="840" y="234" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#FFFFFF" opacity="0.7">OGP 0.00% &#x2022; n=50,000</text>
  <line x1="730" y1="230" x2="563" y2="310" stroke="#FF4500" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- BSD node (bottom-left) -->
  <rect x="50" y="410" width="220" height="70" rx="10" fill="#1A3550" stroke="#228B22" stroke-width="2"/>
  <text x="160" y="435" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#3CB371" font-weight="bold">BSD Conjecture</text>
  <text x="160" y="453" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#FFFFFF">Hasse + &#x393;&#x2080;(N_E) &#x2022; 7/8</text>
  <text x="160" y="469" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#FFFFFF" opacity="0.7">37a1 outlier &#x2022; rank &#x2264; 1 unconditional</text>
  <line x1="270" y1="430" x2="437" y2="350" stroke="#228B22" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Navier-Stokes node (bottom-right) -->
  <rect x="730" y="410" width="220" height="70" rx="10" fill="#1A3550" stroke="#1E90FF" stroke-width="2"/>
  <text x="840" y="435" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#4FA5FF" font-weight="bold">Navier-Stokes</text>
  <text x="840" y="453" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#FFFFFF">Ginibre &#x03B2;&#x2248;3 &#x2022; KS&#x2248;0.09</text>
  <text x="840" y="469" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#FFFFFF" opacity="0.7">&#x394;_NS > 0 &#x2022; dim 24,000</text>
  <line x1="730" y1="430" x2="563" y2="350" stroke="#1E90FF" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Hodge node (bottom center) -->
  <rect x="380" y="510" width="240" height="70" rx="10" fill="#1A3550" stroke="#8B4513" stroke-width="2"/>
  <text x="500" y="535" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#CD853F" font-weight="bold">Hodge Conjecture</text>
  <text x="500" y="553" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#FFFFFF">&#x03C7;(K3) = 24 &#x2022; 24 Niemeier &#x2022; 25/25</text>
  <text x="500" y="569" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#FFFFFF" opacity="0.7">Moonshine lift via K3 surfaces</text>
  <line x1="500" y1="510" x2="500" y2="395" stroke="#8B4513" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Cross-connections (dashed) -->
  <line x1="270" y1="210" x2="730" y2="210" stroke="#D4AF37" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
  <line x1="270" y1="445" x2="730" y2="445" stroke="#D4AF37" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
  <text x="500" y="203" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#D4AF37" opacity="0.5">spectral &#x2194; computational</text>
  <text x="500" y="438" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#D4AF37" opacity="0.5">arithmetic &#x2194; physical</text>

  <!-- Bottom: The non-polynomial obstruction -->
  <rect x="200" y="620" width="600" height="40" rx="8" fill="#112840" stroke="#D4AF37" stroke-width="1"/>
  <text x="500" y="644" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#D4AF37">Non-polynomial obstruction: Reeds gives 24, polynomial gives 9 &#x2014; the gap is why all six are hard</text>

  <!-- Footer -->
  <text x="500" y="690" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#FFFFFF" opacity="0.4">Daugherty, Ward, Ryan &#x2014; The Unified Theory &#x2014; Origin Neural AI, 2026</text>
</svg>
